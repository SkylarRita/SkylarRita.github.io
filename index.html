<!DOCTYPE html>




<html lang="zh-CN">




<head>




    <meta charset="UTF-8">




    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">




    <title>抚养一颗苹果</title>




    <style>




        :root {




            --primary-green: #2EB872;




            --apple-red: #FA4659;




            --cream-bg: #FEFFE4;




            --oat-accent: #F5DE8F;




            --border-color: #4A3427;




        }




        body { margin: 0; background-color: var(--cream-bg); font-family: 'Microsoft YaHei', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }




        #game-container {




            width: 100%; max-width: 400px; height: 100%; max-height: 800px;




            background: var(--cream-bg); border: 5px solid var(--border-color); border-radius: 40px;




            position: relative; box-shadow: 0 12px 0 var(--oat-accent); display: flex; flex-direction: column; overflow: hidden;




        }




        /* 状态栏 */




        .status-bar { padding: 15px; display: flex; justify-content: space-around; background: white; border: 3px solid var(--border-color); margin: 15px; border-radius: 20px;




            box-shadow: 4px 4px 0 var(--border-color); z-index: 10; }




        .stat-item { text-align: center; font-size: 13px; font-weight: bold; color: var(--border-color); }




        .progress-bg { width: 65px; height: 12px; background: #eee; border: 2px solid var(--border-color); border-radius: 10px; margin-top: 5px; overflow: hidden; z-index: 10;}




        .progress-fill { height: 100%; transition: width 0.5s ease; }




        /* 核心画面区 */




        #home-scene { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; background-image: radial-gradient(var(--oat-accent) 2px, transparent 2px); background-size: 20px 20px;




            z-index: 5; }
/* 家园背景图层 - 层级：高于默认点阵背景，低于苹果角色 */
#home-bg-layer {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    z-index: 6; /* 层级：5(原背景) < 6(新背景) < 20(苹果角色) */
    pointer-events: none; /* 不拦截点击、拖拽事件 */
}



        /* 立绘大容器 */




        #apple-character {




            width: 380px;




            height: 380px;




            position: absolute;




            cursor: grab;




            user-select: none;




            transition: transform 0.1s ease-out;




            z-index: 20;




            background-size: contain;




            background-repeat: no-repeat;




            background-position: center bottom;




            transform-origin: center bottom;




        }




        /* 果冻呼吸 */




        @keyframes jellyBreath {




            0% { transform: scale(1, 1); }




            45% { transform: scale(1.03, 0.97) translateY(2px); }




            55% { transform: scale(1.03, 0.97) translateY(2px); }




            100% { transform: scale(1, 1); }




        }




        .breathing { animation: jellyBreath 3.5s ease-in-out infinite; }




        #apple-character.dragging { cursor: grabbing; animation: none; scale: 1.05; }




        




        /* --- 五维换装图层管理（遵循全新图层优先级）【已修改：新增背饰、脸饰层级】 --- */




        .sub-layer { position: absolute; width: 100%; height: 100%; background-size: contain; background-repeat: no-repeat; background-position: center bottom; pointer-events: none; }




        #layer-back { z-index: 1.5; }     /*【新增】背饰：身体下层、衣服最底下 */

        #layer-body { z-index: 2; }       /* 基础身体 */




        #layer-clothes { z-index: 3; }    /* 衣服 */




        #layer-hair { z-index: 4; }       /* 发饰 */




        #layer-accessory { z-index: 4.5; } /* 配饰 */




        #layer-head { z-index: 5; }       /* 头饰 (高优先级) */




        #layer-hand { z-index: 6; }       /* 手持物 */

        #layer-face { z-index: 7; }       /*【新增】脸饰：全图层最顶层 */
        /*新增生病表情图层，层级最高*/
        #layer-sick { z-index: 8; position:absolute;width:100%;height:100%;background-size:contain;background-repeat:no-repeat;background-position:center bottom;pointer-events:none;}
        /* 喂食表情图层 层级最高 */
#layer-eat { 
    z-index: 9; 
    position:absolute;
    width:100%;
    height:100%;
    background-size:contain;
    background-repeat:no-repeat;
    background-position:center bottom;
    pointer-events:none;
    display: none;
}
/* 得意表情图层 */
#layer-proud {
    z-index: 10;
    position:absolute;
    width:100%;
    height:100%;
    background-size:contain;
    background-repeat:no-repeat;
    background-position:center bottom;
    pointer-events:none;
    display: none;
}
/* 搞怪贴纸图层 */
#layer-sticker {
    z-index: 11;
    position:absolute;
    width:100%;
    height:100%;
    background-size:contain;
    background-repeat:no-repeat;
    background-position:center bottom;
    pointer-events:none;
    display: none;
}













        /* 对话气泡 */




        #chat-bubble { position: absolute; top: 12%; left: 50%; transform: translateX(-50%); background: white; border: 3px solid var(--border-color); padding: 12px 20px;




            border-radius: 25px; font-size: 15px; display: none; z-index: 100; box-shadow: 4px 4px 0 var(--border-color); font-weight: bold; color: var(--border-color); width: 75%;




            text-align: center; }




        /* 底部导航 */




        .nav-bar { display: flex; justify-content: space-around; padding: 20px; background: var(--oat-accent); border-top: 5px solid var(--border-color); z-index: 10;}




        .nav-btn { background: white; border: 3px solid var(--border-color); padding: 12px; border-radius: 15px; font-weight: bold; box-shadow: 0 5px 0 var(--border-color);




            cursor: pointer; }




        .nav-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--border-color); }




        /* 故事开场序幕 */




        #onboarding { position: absolute; inset: 0; background: var(--cream-bg); z-index: 200; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px;




            text-align: center; }




        .story-text { font-size: 18px; font-weight: bold; margin-bottom: 20px; color: var(--border-color); line-height: 1.6; }




        .story-img-container { width: 340px; height: 340px; margin: 15px auto; background-size: contain; background-repeat: no-repeat; background-position: center; }




        .input-group { margin: 10px 0; width: 100%; font-weight: bold; color: var(--border-color); }




        input { padding: 12px; border: 3px solid var(--border-color); border-radius: 15px; font-size: 16px; width: 85%; margin-top: 8px; outline: none; }




        .start-btn { background: var(--primary-green); color: white; border: 3px solid var(--border-color); padding: 15px 40px; border-radius: 20px; font-weight: bold; cursor: pointer;




            margin-top: 30px; box-shadow: 0 5px 0 var(--border-color); }













        /* 👑 【修改】全新上下分区换装商城弹窗系统：上半苹果，下半商品 👑 */




        #shop-modal { position: absolute; inset: 0; background: rgba(0,0,0,0.4); z-index: 150; display: none; justify-content: center; align-items: flex-end; }




        .shop-content { width: 100%; background: var(--cream-bg); border-top: 5px solid var(--border-color); border-radius: 30px 30px 0 0; display: flex; flex-direction: column;




            height: 85%; max-height: 85%; }




        .shop-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; border-bottom: 3px solid var(--border-color); background: white; }




        .shop-title { font-weight: bold; color: var(--border-color); font-size: 16px; }




        .close-shop { cursor: pointer; font-size: 20px; font-weight: bold; color: var(--border-color); }




        




        /* 【修改】试衣间上下布局：上半苹果预览、下半分类商品 */




        .shop-main-layout { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }




        




        /* 上部：苹果预览区 */




        .shop-preview-stage {




            height: 52%; background: #ffffff; border-bottom: 3px solid var(--border-color);




            position: relative; display: flex; justify-content: center; align-items: center; overflow: hidden;




            background-image: radial-gradient(#f0efd5 1.5px, transparent 1.5px); background-size: 15px 15px;




        }




        /* 缩放自适应当前预览面板的独立小苹果容器 */




        .shop-stage-apple {




            width: 320px; height: 320px; position: absolute; transform-origin: center bottom; pointer-events: none;




            bottom: -20px;




            transform: scale(0.7);




        }




        




        /* 下部：商品陈列与分类区 */




        .shop-market-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #fffaf1; }




        /* 商城横向分类标签 */




        .shop-tabs { display: flex; overflow-x: auto; padding: 10px 8px; gap: 6px; border-bottom: 2px solid var(--border-color); background: white; scrollbar-width: none; }




        .shop-tabs::-webkit-scrollbar { display: none; }




        .tab-btn { background: white; border: 2px solid var(--border-color); padding: 5px 10px; border-radius: 10px; font-size: 12px; font-weight: bold; cursor: pointer; white-space: nowrap; }




        .tab-btn.active { background: var(--oat-accent); box-shadow: 1px 1px 0 var(--border-color); }




        




        /* 右侧独立纵向滚动列表 */




        .item-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }




        .shop-item { background: white; border: 2px solid var(--border-color); border-radius: 12px; padding: 8px 10px; display: flex; justify-content: space-between; align-items: center; position: relative; box-shadow: 2px 2px 0 var(--border-color); gap:10px; }
        /*=====修改：外框正方形，内部图片居中自适应、不拉伸=====*/
        .item-thumb{
            width:50px;
            height:50px;
            border:2px solid var(--border-color);
            border-radius:8px;
            background:#f8f8f8;
            display:flex;
            align-items:center;
            justify-content:center;
        }
        .item-thumb-inner{
            width:100%;
            height:100%;
            background-size:contain;
            background-repeat:no-repeat;
            background-position:center;
        }
        .item-info { display: flex; flex-direction: column; gap: 2px; flex:1; }




        .item-name { font-size: 13px; font-weight: bold; color: var(--border-color); }




        .item-price { font-size: 11px; color: var(--apple-red); font-weight: bold; }




        .shop-btn { background: var(--primary-green); color: white; border: 2px solid var(--border-color); padding: 5px 12px; border-radius: 8px; font-size: 11px; font-weight: bold; cursor: pointer; }




        .shop-btn.previewing { background: #FF8B13; }




        .shop-btn.owned { background: #8bc34a; }




        




        .depressed { filter: saturate(0.4); }




        .dead { filter: grayscale(1); }



/* 关卡选择弹窗样式 */
#level-select-modal{
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 220;
    display: none;
    justify-content: center;
    align-items: center;
}
.level-select-box{
    background: var(--cream-bg);
    border: 5px solid var(--border-color);
    border-radius: 20px;
    padding: 25px;
    width: 80%;
    max-width: 300px;
    box-shadow: 6px 6px 0 var(--oat-accent);
}
.level-title{
    text-align: center;
    font-weight: bold;
    color: var(--border-color);
    font-size: 16px;
    margin-bottom: 20px;
}
.level-list{
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
}
.level-item{
    background: white;
    border: 3px solid var(--border-color);
    border-radius: 12px;
    text-align: center;
    padding: 10px;
    font-weight: bold;
    color: var(--border-color);
    cursor: pointer;
    box-shadow: 3px 3px 0 var(--border-color);
}
.level-item:active{
    transform: translateY(2px);
    box-shadow: 1px 1px 0 var(--border-color);
}
.level-close{
    margin-top: 20px;
    width: 100%;
    padding: 10px;
    background: var(--apple-red);
    color: white;
    border: 3px solid var(--border-color);
    border-radius: 12px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 3px 3px 0 var(--border-color);
}
    </style>




</head>




<body>




<div id="game-container">




    <div id="onboarding" style="display: none;">




        <div id="story-phase-1">




            <div class="story-text">这天，你捡到了一袋种子。</div>




            <div class="story-img-container" style="background-image: url('seed.png');"></div>




            <button class="start-btn" onclick="gameState.nextStoryPhase(2)">看看是什么</button>




        </div>




        <div id="story-phase-2" style="display: none;">




            <div class="story-text">于是，你决定——<br>领养一颗苹果。</div>




            <div class="story-img-container" style="background-image: url('seed.png'); margin-bottom: 25px;"></div>




            <button class="start-btn" onclick="gameState.nextStoryPhase(3)">开始仪式</button>




        </div>




        <div id="story-phase-3" style="display: none; width: 100%;">




            <div class="input-group">




                <p>名字是最短的咒语，请先为它取名吧：</p>




                <input type="text" id="pet-name-input" placeholder="输入名字...">




            </div>




            <div class="input-group" style="margin-top: 20px;">




                <p>你希望它称呼你为……</p>




                <input type="text" id="user-name-input" placeholder="输入称呼...">




            </div>




            <button class="start-btn" onclick="gameState.finishOnboarding()">建立羁绊</button>




        </div>




    </div>




    <div class="status-bar">




        <div class="stat-item">健康 <div class="progress-bg"><div id="hp-bar" class="progress-fill" style="background: var(--primary-green);"></div></div></div>




        <div class="stat-item">快乐 <div class="progress-bg"><div id="happy-bar" class="progress-fill" style="background: #FFD93D;"></div></div></div>




        <div class="stat-item">饱腹 <div class="progress-bg"><div id="hunger-bar" class="progress-fill" style="background: #FF8B13;"></div></div></div>




        <div class="stat-item">金币 <div id="coin-count" style="color:var(--apple-red); font-size: 16px; font-weight: bold;">100</div></div>




    </div>




    <div id="home-scene">

<!-- 新增：家园背景图层 -->
         <div id="home-bg-layer"></div>


        <div id="chat-bubble"></div>




        <div id="apple-character" class="breathing"




             onmousedown="dragState.start(event)"




             ontouchstart="dragState.start(event)">

            <!--【新增：背饰、脸饰、生病图层】 -->
            <div id="layer-back" class="sub-layer"></div>
            <div id="layer-body" class="sub-layer"></div>
            <div id="layer-clothes" class="sub-layer"></div>
            <div id="layer-hair" class="sub-layer"></div>
            <div id="layer-accessory" class="sub-layer"></div>
            <div id="layer-head" class="sub-layer"></div>
            <div id="layer-hand" class="sub-layer"></div>
            <div id="layer-face" class="sub-layer"></div>
            <div id="layer-sick"></div>
            <!-- 新增：喂食表情图层 -->
             <div id="layer-proud"></div>
<div id="layer-sticker"></div>
            <div id="layer-eat" class="sub-layer"></div>
        </div>




    </div>




             <div class="nav-bar">
        <div class="nav-btn" onclick="gameState.feed()">喂食</div>
        <div class="nav-btn" style="background: var(--apple-red); color: white;" onclick="gameState.passLevel()">测试闯关</div>
        <div class="nav-btn" onclick="shopSystem.openShop()">商城</div>
        <!-- 新增：家具城按钮 -->
        <div class="nav-btn" onclick="furnitureSystem.openFurniture()">家具城</div>
        <div class="nav-btn" onclick="gameState.reset()">重置</div>
    </div>




    




    <div id="shop-modal" onclick="shopSystem.closeShop()">




        <div class="shop-content" onclick="event.stopPropagation()">




            <div class="shop-header">




                <div class="shop-title">🛍️ 苹果的梦想商城</div>




                <div class="close-shop" onclick="shopSystem.closeShop()">×</div>




            </div>




            




            <div class="shop-main-layout">




                <div class="shop-preview-stage">




                    <div id="shop-stage-apple-container" class="shop-stage-apple breathing">
                        <!--商城预览也加生病图层-->
                        <div id="stage-layer-back" class="sub-layer"></div>
                        <div id="stage-layer-body" class="sub-layer"></div>
                        <div id="stage-layer-clothes" class="sub-layer"></div>
                        <div id="stage-layer-hair" class="sub-layer"></div>
                        <div id="stage-layer-accessory" class="sub-layer"></div>
                        <div id="stage-layer-head" class="sub-layer"></div>
                        <div id="stage-layer-hand" class="sub-layer"></div>
                        <div id="stage-layer-face" class="sub-layer"></div>
                        <div id="stage-layer-sick" style="position:absolute;width:100%;height:100%;background-size:contain;background-repeat:no-repeat;background-position:center bottom;pointer-events:none;z-index:8;"></div>
                    </div>




                    <div style="position: absolute; top: 10px; left: 12px; background: rgba(74,52,39,0.1); padding: 4px 8px; border-radius: 8px; font-size: 11px; font-weight: bold; color: var(--border-color); pointer-events: none; border: 1px solid rgba(74,52,39,0.2); box-shadow: 1px 1px 0 rgba(74,52,39,0.1);">✨ 试衣间</div>




                </div>




                




                <div class="shop-market-panel">




                    <div class="shop-tabs" id="shop-tabs-container"></div>




                    <div class="item-list" id="shop-item-list"></div>




                </div>




            </div>




        </div>




    </div>




</div>

    <div id="furniture-modal" style="position: absolute; inset: 0; background: rgba(0,0,0,0.4); z-index: 160; display: none; justify-content: center; align-items: center;" onclick="furnitureSystem.closeFurniture()">
        <div style="width: 85%; max-width: 340px; background: var(--cream-bg); border: 5px solid var(--border-color); border-radius: 25px; padding: 20px; box-shadow: 6px 6px 0 var(--oat-accent);" onclick="event.stopPropagation()">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">

            </div>
        </div>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 3px solid var(--border-color); background: white;">




        <div id="stage-title" style="font-weight: bold; color: var(--border-color); font-size: 16px;">🎯 核心闯关：第一关</div>




        <div style="cursor: pointer; font-size: 20px; font-weight: bold; color: var(--border-color);" onclick="stageSystem.closeStage()">×</div>




    </div>




    <div style="flex: 1; position: relative; overflow: auto; background: #f0f0f0; display: flex; justify-content: center; align-items: flex-start;">




        <div id="stage-img-wrapper" style="position: relative; width: 100%; max-width: 400px;">




            <img id="stage-bg-img" src="1.jpg" style="width: 100%; display: block;">




            <div id="stage-hotspots" style="position: absolute; inset: 0; pointer-events: none;"></div>




        </div>




    </div>




    <div id="stage-panel" style="background: white; border-top: 5px solid var(--border-color); padding: 15px; display: flex; flex-direction: column; gap: 10px; min-height: 180px; box-shadow: 0 -5px 15px rgba(0,0,0.05);">




        <div id="panel-prompt" style="font-size: 15px; font-weight: bold; color: var(--border-color); text-align: center; margin-bottom: 5px;">




            💡 请点击图片上的黄色中文标签开始挑战！




        </div>




        <div id="panel-actions" style="display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;"></div>




        <div id="panel-result" style="display: none; background: #fffaf1; border: 2px dashed var(--border-color); border-radius: 12px; padding: 10px; text-align: center; margin-top: 5px;">




            <div id="result-word" style="font-size: 18px; font-weight: bold; color: var(--apple-red);">word</div>




            <div id="result-phonetic" style="font-size: 13px; color: #666; margin: 2px 0;">/phonetic/</div>




            <button id="result-audio-btn" style="background: var(--oat-accent); border: 2px solid var(--border-color); border-radius: 8px; padding: 3px 10px; font-size: 12px; font-weight: bold; cursor: pointer;">🔊 听标准发音</button>




        </div>

        this.happy = Math.max(0, this.happy - 1);
        this.hunger = Math.max(0, this.hunger - 1);

        // 快乐值过低 → 扣健康
        if (this.happy <= 20) {
            this.hp = Math.max(0, this.hp - 2);
        }
        // 饱腹值过低 → 扣健康
        if (this.hunger <= 20) {
            this.hp = Math.max(0, this.hp - 3);
        }

        // 健康归0 死亡
        if (this.hp <= 0) {
            this.hp = 0;
            this.isDead = true;
            if(this.blinkTimer) clearTimeout(this.blinkTimer);
            if(this.randStatusTimer) clearInterval(this.randStatusTimer);
        }
        this.updateUI(); 
        this.saveProgress(); 
        this.renderPet();

                // ========== 新增：随机状态切换逻辑 ==========
        startRandStatusTimer() {
            // 先清空旧定时器

            // 每 12 秒切换一次状态（可自行改数字，单位：毫秒）
           this.randStatusTimer = setInterval(() => {

    if(self.isDead || self.level < 2 || self.getSickImg() !== '') {
        // 生病时 强制切回常态，清空得意/贴纸等状态
        self.randStatus = "normal";
        self.renderPet();
        return;
    }
                // 1. 根据权重随机选择状态
                const weightList = [];
                Object.keys(self.statusWeight).forEach(key => {
                    const num = self.statusWeight[key];
                    for(let i=0; i<num; i++){
                        weightList.push(key);
                    }
                });
                const randomIdx = Math.floor(Math.random() * weightList.length);
                self.randStatus = weightList[randomIdx];

                // 2. 如果是画作状态，再随机选一张画(1/2/3)
                if(self.randStatus === "paint"){
                    self.paintType = Math.floor(Math.random() * 3) + 1;
                }

                // 3. 刷新立绘
                self.renderPet();

                // 4. 随机弹出对应台词（常态不说话）
                if(self.randStatus !== "normal"){
                    let talkArr = [];
                    let talkKey = self.randStatus;
                    // 画作区分3种文案
                    if(self.randStatus === "paint"){
                        talkKey = "paint" + self.paintType;
                    }
                    talkArr = self.statusTalk[talkKey] || [];
                    if(talkArr.length > 0){
                        const talkIdx = Math.floor(Math.random() * talkArr.length);
                        let text = talkArr[talkIdx];
                        // 替换占位昵称、名字
                        text = text.replace(/\${userName}/g, self.userName);
                        text = text.replace(/\${petName}/g, self.petName);
                        self.showBubble(text);
                    }
                }
            }, 12000);
        },

        renderTabs() {




            const container = document.getElementById('shop-tabs-container');




            container.innerHTML = Object.keys(CATEGORY_MAP).map(key => `

        renderItems() {




            const listContainer = document.getElementById('shop-item-list');




            const filteredItems = SHOP_DATABASE.filter(i => i.category === this.currentTab);




            if(filteredItems.length === 0) {




                listContainer.innerHTML = `<div style="text-align:center; color:#999; font-size:12px; padding-top:30px; font-weight:bold;">该分类下暂无新品上架</div>`;




                return;




            }




            listContainer.innerHTML = filteredItems.map(item => {




                const isOwned = gameState.ownedClothes.includes(item.id);




                const isEquipped = gameState.equippedClothes[item.category] === item.file;




                const isPreviewing = gameState.previewClothes[item.category] === item.file;




                




                let btnText = `购买 (${item.price}💰)`;




                let btnClass = "";




                




                if (isOwned) {




                    btnText = isEquipped ? "脱下" : "穿上";




                    if (isEquipped) btnClass = "owned";




                } else if (isPreviewing) {




                    btnText = "购买此试穿件";




                    btnClass = "previewing";




                }




                




                const lockText = gameState.level < item.minLevel ? `<span style="font-size:10px; color:#999; font-weight:normal;">🔒 Lv.${item.minLevel}解锁</span>` : '';




                return `




                    <div class="shop-item" onclick="shopSystem.previewItem('${item.id}')">
                        <div class="item-thumb">
                            <div class="item-thumb-inner" style="background-image:url('${item.file}.png')"></div>
                        </div>
                        <div class="item-info">




                            <div class="item-name">${item.name} ${lockText}</div>




                            <div class="item-price">${isOwned ? '✨ 已拥有' : item.price + ' 金币'}</div>




                        </div>




                        <button class="shop-btn ${btnClass}" ${gameState.level < item.minLevel && !isOwned ? 'disabled style="background:#ccc; border-color:#aaa;"' : ''} onclick="shopSystem.handleAction(event, '${item.id}')">




                            ${btnText}




                        </button>




                    </div>




                `;




            }).join('');




        },




        previewItem(itemId) {




            const item = SHOP_DATABASE.find(i => i.id === itemId);




            if(!item) return;




            // 点击整行触发左侧小苹果在试衣间试穿/脱下切换




            if (gameState.previewClothes[item.category] === item.file) {




                gameState.previewClothes[item.category] = null;




            } else {




                gameState.previewClothes[item.category] = item.file;




            }




            gameState.renderPet();




            this.renderItems();




        },




        handleAction(event, itemId) {




            event.stopPropagation(); // 阻止触发整行试穿




            const item = SHOP_DATABASE.find(i => i.id === itemId);




            if(!item) return;




            const isOwned = gameState.ownedClothes.includes(item.id);




            if (isOwned) {




                // 已拥有的情况下，穿上/脱下会直接改变最终配备属性




                if (gameState.equippedClothes[item.category] === item.file) {




                    gameState.equippedClothes[item.category] = null;




                } else {




                    gameState.equippedClothes[item.category] = item.file;




                }




                gameState.previewClothes = { ...gameState.equippedClothes };




            } else {




                // 未拥有的情况点击进行正式购买交易




                if (gameState.coins < item.price) {




                    gameState.showBubble("金币不足，快去测试闯关赚钱吧！");




                    return;




                }




                gameState.coins -= item.price;




                gameState.ownedClothes.push(item.id);




                gameState.equippedClothes[item.category] = item.file;




                gameState.previewClothes = { ...gameState.equippedClothes };




                gameState.showBubble(`成功换装【${item.name}】！`);
// 购入新服饰，快乐值提升
gameState.happy = Math.min(100, gameState.happy + 15);



            }




            gameState.renderPet();




            gameState.updateUI();




            gameState.saveProgress();




            this.renderItems();




        }




    };




    gameState.init();
